<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Mobile Compass & Orientation</title>
    <style>
      /* Base page setup */
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        padding-top: 30px;
        overflow-y: auto;
        user-select: none;
      }

      #desktop-blocker {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        text-align: center;
        padding-top: 100px;
      }

      .app-container {
        text-align: center;
        width: 100%;
      }

      .arrow-indicator {
        font-size: 40px;
        color: #ffffff;
        margin-bottom: 0;
        display: block;
      }

      .degree-display {
        font-size: 80px;
        font-weight: 900;
        margin: 0;
        line-height: 1;
      }

      .degree-symbol {
        font-size: 30px;
        vertical-align: top;
        color: #777;
      }

      /* The 3-Axes Row */
      .axes-row {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
        background: #252525;
        padding: 15px;
        width: 90%;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }

      .axis-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 80px;
      }

      .axis-label {
        font-size: 11px;
        color: #aaa;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .axis-value {
        font-size: 18px;
        font-family: monospace;
        color: #2ed573;
      }

      #start-btn {
        padding: 15px 35px;
        font-size: 16px;
        font-weight: bold;
        background-color: #3498db;
        border: none;
        color: white;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-left: auto;
        margin-right: auto;
      }

      #start-btn.active {
        background-color: #2ed573;
        cursor: default;
      }

      .check-mark {
        display: none;
        font-size: 20px;
      }

      #start-btn.active .check-mark {
        display: inline;
      }

      .future-content-spacer {
        margin-top: 40px;
        width: 80%;
        border-top: 1px dashed #444;
      }
    </style>
  </head>
  <body>
    <div id="desktop-blocker">
      <h1>MOBILE ONLY</h1>
      <p>Please open this site on your smartphone or tablet.</p>
    </div>

    <div class="app-container" id="main-content">
      <div class="arrow-indicator">↑</div>
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>

      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">ALPHA (α)</span>
          <span class="axis-value" id="val-alpha">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">BETA (β)</span>
          <span class="axis-value" id="val-beta">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">GAMMA (γ)</span>
          <span class="axis-value" id="val-gamma">0°</span>
        </div>
      </div>

      <button id="start-btn">
        <span class="check-mark">✓</span>
        <span id="btn-text">Start Sensors</span>
      </button>

      <div class="future-content-spacer"></div>
    </div>

    <script>
      const headingDisplay = document.getElementById("heading-val");
      const alphaDisplay = document.getElementById("val-alpha");
      const betaDisplay = document.getElementById("val-beta");
      const gammaDisplay = document.getElementById("val-gamma");
      const startBtn = document.getElementById("start-btn");
      const btnText = document.getElementById("btn-text");

      // 1. PURE COMPASS LOGIC (Your original working code)
      function handleCompass(event) {
        let heading = 0;
        if (event.webkitCompassHeading) {
          heading = event.webkitCompassHeading;
        } else {
          heading = event.alpha;
        }
        const finalHeading = Math.round(heading) % 360;
        headingDisplay.innerText = finalHeading;
        alphaDisplay.innerText = finalHeading + "°";
      }

      // 2. PURE ORIENTATION LOGIC (For Beta and Gamma only)
      function handleTilt(event) {
        betaDisplay.innerText = Math.round(event.beta || 0) + "°";
        gammaDisplay.innerText = Math.round(event.gamma || 0) + "°";
      }

      async function initSensors() {
        startBtn.classList.add("active");
        btnText.innerText = "Sensors Active";
        startBtn.disabled = true;

        // iOS Support
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === "granted") {
              window.addEventListener("deviceorientation", (e) => {
                handleCompass(e);
                handleTilt(e);
              });
            }
          } catch (err) {
            console.error(err);
          }
        }
        // Android Support (The Split)
        else {
          // Compass - Using Absolute (Original working method)
          window.addEventListener(
            "deviceorientationabsolute",
            handleCompass,
            true,
          );

          // Tilt - Using standard (For Beta/Gamma)
          window.addEventListener("deviceorientation", handleTilt, true);
        }
      }

      startBtn.addEventListener("click", initSensors);

      window.onload = () => {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile && window.innerWidth > 1024) {
          document.getElementById("desktop-blocker").style.display = "block";
          document.getElementById("main-content").style.display = "none";
        }
      };
    </script>
  </body>
</html>
