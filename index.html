<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Compass & Relative Tracking</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        padding-top: 30px;
        overflow-y: auto;
        user-select: none;
      }

      #desktop-blocker {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        text-align: center;
        padding-top: 100px;
      }

      .app-container {
        text-align: center;
        width: 100%;
      }

      .arrow-indicator {
        font-size: 40px;
        color: #ffffff;
        margin-bottom: 0;
        display: block;
      }

      .degree-display {
        font-size: 80px;
        font-weight: 900;
        margin: 0;
        line-height: 1;
      }

      .degree-symbol {
        font-size: 30px;
        vertical-align: top;
        color: #777;
      }

      /* The 3-Axes Row - Dynamic Tracking */
      .axes-row {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 25px;
        background: #252525;
        padding: 15px;
        width: 95%;
        max-width: 450px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 15px;
        border: 1px solid #444;
      }

      .axis-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
      }

      .axis-label {
        font-size: 10px;
        color: #ff4757; /* Red to show it's tracking from a point */
        margin-bottom: 5px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .axis-value {
        font-size: 18px;
        font-family: monospace;
        color: #2ed573;
      }

      #start-btn {
        padding: 15px 35px;
        font-size: 16px;
        font-weight: bold;
        background-color: #3498db;
        border: none;
        color: white;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-left: auto;
        margin-right: auto;
      }

      #start-btn.active {
        background-color: #2ed573;
      }

      .check-mark {
        display: none;
        font-size: 20px;
      }

      #start-btn.active .check-mark {
        display: inline;
      }

      .future-content-spacer {
        margin-top: 40px;
        width: 80%;
        border-top: 1px dashed #444;
      }
    </style>
  </head>
  <body>
    <div id="desktop-blocker">
      <h1>MOBILE ONLY</h1>
      <p>Please open this site on your smartphone or tablet.</p>
    </div>

    <div class="app-container" id="main-content">
      <div class="arrow-indicator">↑</div>
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>

      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">Δ ALPHA</span>
          <span class="axis-value" id="val-alpha">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">Δ BETA</span>
          <span class="axis-value" id="val-beta">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">Δ GAMMA</span>
          <span class="axis-value" id="val-gamma">0°</span>
        </div>
      </div>

      <button id="start-btn">
        <span class="check-mark">✓</span>
        <span id="btn-text">Reset to Current Position</span>
      </button>

      <div class="future-content-spacer"></div>
    </div>

    <script>
      const headingDisplay = document.getElementById("heading-val");
      const alphaDisplay = document.getElementById("val-alpha");
      const betaDisplay = document.getElementById("val-beta");
      const gammaDisplay = document.getElementById("val-gamma");
      const startBtn = document.getElementById("start-btn");
      const btnText = document.getElementById("btn-text");

      // Calibration storage
      let refAlpha = null;
      let refBeta = null;
      let refGamma = null;
      let trackingActive = false;

      function handleOrientation(event) {
        // 1. ABSOLUTE COMPASS (Always True North)
        let currentAlpha = 0;
        if (event.webkitCompassHeading) {
          currentAlpha = event.webkitCompassHeading;
        } else {
          currentAlpha = event.alpha || 0;
        }

        headingDisplay.innerText = Math.round(currentAlpha) % 360;

        // 2. RELATIVE TRACKING (Delta from the point of button press)
        if (trackingActive && refAlpha !== null) {
          // Alpha Delta
          let diffAlpha = Math.round(currentAlpha - refAlpha);
          if (diffAlpha > 180) diffAlpha -= 360;
          if (diffAlpha < -180) diffAlpha += 360;

          // Beta/Gamma Delta
          let diffBeta = Math.round((event.beta || 0) - refBeta);
          let diffGamma = Math.round((event.gamma || 0) - refGamma);

          alphaDisplay.innerText = (diffAlpha > 0 ? "+" : "") + diffAlpha + "°";
          betaDisplay.innerText = (diffBeta > 0 ? "+" : "") + diffBeta + "°";
          gammaDisplay.innerText = (diffGamma > 0 ? "+" : "") + diffGamma + "°";
        }
      }

      async function initSensors() {
        // First time press? Activate listeners
        if (!trackingActive) {
          if (typeof DeviceOrientationEvent.requestPermission === "function") {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === "granted") {
              window.addEventListener("deviceorientation", handleOrientation);
            }
          } else {
            window.addEventListener(
              "deviceorientationabsolute",
              handleOrientation,
              true,
            );
            window.addEventListener(
              "deviceorientation",
              handleOrientation,
              true,
            );
          }
        }

        // Always "Recalibrate" on click:
        // Small timeout to ensure the sensors have a reading if it's the first click
        setTimeout(() => {
          const currentAlphaVal = parseFloat(headingDisplay.innerText);
          // We use the current values as the new reference
          refAlpha = currentAlphaVal;
          // For Beta/Gamma we need to grab them from a temporary event or the display
          // For simplicity, we grab the current values as the new 0
          refBeta = lastKnownBeta;
          refGamma = lastKnownGamma;

          trackingActive = true;
          startBtn.classList.add("active");
          btnText.innerText = "Recalibrate Zero";
        }, 50);
      }

      // Keep track of raw values to use as reference on click
      let lastKnownBeta = 0;
      let lastKnownGamma = 0;
      window.addEventListener("deviceorientation", (e) => {
        lastKnownBeta = e.beta || 0;
        lastKnownGamma = e.gamma || 0;
      });

      startBtn.addEventListener("click", initSensors);

      window.onload = () => {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile && window.innerWidth > 1024) {
          document.getElementById("desktop-blocker").style.display = "block";
          document.getElementById("main-content").style.display = "none";
        }
      };
    </script>
  </body>
</html>
