<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Global Compass & Satellite Finder</title>
    <style>
      /* השארתי את כל ה-CSS המקורי שלך */
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding-top: 30px;
        overflow-y: auto;
        user-select: none;
      }

      #desktop-blocker {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        text-align: center;
        padding-top: 100px;
      }

      .app-container {
        text-align: center;
        width: 100%;
      }
      .arrow-indicator {
        font-size: 40px;
        color: #ffffff;
        margin-bottom: 0;
        display: block;
      }
      .degree-display {
        font-size: 80px;
        font-weight: 900;
        margin: 0;
        line-height: 1;
      }
      .degree-symbol {
        font-size: 30px;
        vertical-align: top;
        color: #777;
      }

      .axes-row {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
        background: #252525;
        padding: 15px;
        width: 90%;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }

      .axis-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 80px;
      }
      .axis-label {
        font-size: 11px;
        color: #aaa;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .axis-value {
        font-size: 18px;
        font-family: monospace;
        color: #2ed573;
      }

      #start-btn {
        padding: 15px 35px;
        font-size: 16px;
        font-weight: bold;
        background-color: #3498db;
        border: none;
        color: white;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-left: auto;
        margin-right: auto;
      }

      #start-btn.active {
        background-color: #2ed573;
        cursor: default;
      }
      .check-mark {
        display: none;
        font-size: 20px;
      }
      #start-btn.active .check-mark {
        display: inline;
      }

      .geo-section {
        margin-top: 20px;
        padding: 15px;
        background: #252525;
        width: 90%;
        max-width: 400px;
        border-radius: 15px;
        margin-left: auto;
        margin-right: auto;
        text-align: center;
      }

      input {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #444;
        background-color: #333;
        color: white;
        width: 85%;
        margin-bottom: 12px;
        font-size: 16px;
        box-sizing: border-box;
      }

      .geo-btn {
        padding: 12px;
        background-color: #f39c12;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 85%;
        margin-bottom: 10px;
      }

      /* כפתור ירוק ללווין */
      .sat-btn {
        background-color: #27ae60;
      }

      .coords-display {
        margin-top: 10px;
        font-family: monospace;
        color: #3498db;
        font-size: 14px;
        min-height: 20px;
        border-top: 1px solid #444;
        padding-top: 10px;
      }

      .sat-result-display {
        margin-top: 10px;
        color: #e74c3c;
        font-weight: bold;
        font-size: 18px;
      }

      .geo-hint {
        font-size: 10px;
        color: #777;
        margin-top: 5px;
      }
      .future-content-spacer {
        margin-top: 40px;
        width: 80%;
        border-top: 1px dashed #444;
      }
    </style>
  </head>
  <body>
    <div id="desktop-blocker">
      <h1>MOBILE ONLY</h1>
      <p>Please open this site on your smartphone or tablet.</p>
    </div>

    <div class="app-container" id="main-content">
      <div class="arrow-indicator">↑</div>
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>

      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">ALPHA</span>
          <span class="axis-value" id="val-alpha">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">BETA</span>
          <span class="axis-value" id="val-beta">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">GAMMA</span>
          <span class="axis-value" id="val-gamma">0°</span>
        </div>
      </div>

      <button id="start-btn">
        <span class="check-mark">✓</span>
        <span id="btn-text">Start Sensors</span>
      </button>

      <div class="geo-section">
        <input type="text" id="geo-input" placeholder="Zip City" />
        <button class="geo-btn" onclick="getCoordinates()">
          1. Set My Location
        </button>
        <div id="coords-result" class="coords-display">Lat: -- | Lon: --</div>
      </div>

      <div class="geo-section">
        <input
          type="number"
          id="sat-input"
          placeholder="Satellite Longitude (-180 to 180)"
        />
        <button class="geo-btn sat-btn" onclick="calculateSatellite()">
          2. Calculate Satellite Look Angle
        </button>
        <div id="sat-result" class="sat-result-display">
          AZIMUTH: -- | ELEV: --
        </div>
        <div class="geo-hint">
          Enter the satellite's position relative to Greenwich
        </div>
      </div>

      <div class="future-content-spacer"></div>
    </div>

    <script>
      let userLat = null;
      let userLon = null;

      const headingDisplay = document.getElementById("heading-val");
      const alphaDisplay = document.getElementById("val-alpha");
      const betaDisplay = document.getElementById("val-beta");
      const gammaDisplay = document.getElementById("val-gamma");
      const startBtn = document.getElementById("start-btn");
      const btnText = document.getElementById("btn-text");
      const coordsResult = document.getElementById("coords-result");
      const satResult = document.getElementById("sat-result");

      // פונקציית המיקום המקורית שלך
      async function getCoordinates() {
        const query = document.getElementById("geo-input").value;
        if (!query) return alert("Please enter a location");
        coordsResult.innerText = "Searching...";
        try {
          const response = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
          );
          const data = await response.json();
          if (data && data.length > 0) {
            userLat = parseFloat(data[0].lat);
            userLon = parseFloat(data[0].lon);
            coordsResult.innerText = `Lat: ${userLat.toFixed(4)} | Lon: ${userLon.toFixed(4)}`;
          } else {
            coordsResult.innerText = "Location not found.";
          }
        } catch (error) {
          coordsResult.innerText = "Error fetching data.";
        }
      }

      // פונקציית חישוב הלווין החדשה
      function calculateSatellite() {
        const satLonInput = document.getElementById("sat-input").value;

        if (userLat === null || userLon === null) {
          return alert("Please complete Step 1 (Search Location) first.");
        }
        if (satLonInput === "") {
          return alert("Please enter the Satellite Longitude.");
        }

        const satLon = parseFloat(satLonInput);
        const R_EARTH = 6371.0;
        const R_SAT = 42164.0; // רדיוס מהמרכז (35786 + 6371 + כמה קילומטרים לדיוק)

        const phi = userLat * (Math.PI / 180); // קו רוחב משתמש ברדיאנים
        const deltaL = (satLon - userLon) * (Math.PI / 180); // הפרש קווי אורך

        // חישוב Elevation (הגבהה)
        const cosC = Math.cos(phi) * Math.cos(deltaL);
        const elevationRad = Math.atan(
          (cosC - R_EARTH / R_SAT) / Math.sqrt(1 - cosC * cosC),
        );
        const elevationDeg = elevationRad * (180 / Math.PI);

        // חישוב Azimuth (אזימוט)
        let azimuthDeg =
          180 + (180 / Math.PI) * Math.atan(Math.tan(deltaL) / Math.sin(phi));
        if (userLat < 0) azimuthDeg -= 180; // תיקון לחצי כדור דרומי אם צריך

        satResult.innerHTML = `AZIMUTH: ${Math.round(azimuthDeg)}° <br> ELEVATION: ${Math.round(elevationDeg)}°`;
      }

      // חיישנים
      function handleCompass(event) {
        let heading = event.webkitCompassHeading || event.alpha || 0;
        const finalHeading = Math.round(heading) % 360;
        headingDisplay.innerText = finalHeading;
        alphaDisplay.innerText = finalHeading + "°";
      }

      function handleTilt(event) {
        betaDisplay.innerText = Math.round(event.beta || 0) + "°";
        gammaDisplay.innerText = Math.round(event.gamma || 0) + "°";
      }

      async function initSensors() {
        startBtn.classList.add("active");
        btnText.innerText = "Sensors Active";
        startBtn.disabled = true;

        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === "granted") {
              window.addEventListener("deviceorientation", (e) => {
                handleCompass(e);
                handleTilt(e);
              });
            }
          } catch (err) {
            console.error(err);
          }
        } else {
          window.addEventListener(
            "deviceorientationabsolute",
            handleCompass,
            true,
          );
          window.addEventListener("deviceorientation", handleTilt, true);
        }
      }

      startBtn.addEventListener("click", initSensors);

      window.onload = () => {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile && window.innerWidth > 1024) {
          document.getElementById("desktop-blocker").style.display = "block";
          document.getElementById("main-content").style.display = "none";
        }
      };
    </script>
  </body>
</html>
