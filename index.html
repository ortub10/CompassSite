<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Global Compass & Geocoder</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        padding-top: 30px;
        overflow-y: auto;
        user-select: none;
      }
      #desktop-blocker {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        text-align: center;
        padding-top: 100px;
      }
      .app-container {
        text-align: center;
        width: 100%;
      }
      .degree-display {
        font-size: 80px;
        font-weight: 900;
        margin: 0;
        line-height: 1;
      }
      .degree-symbol {
        font-size: 30px;
        vertical-align: top;
        color: #777;
      }
      .axes-row {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
        background: #252525;
        padding: 15px;
        width: 90%;
        max-width: 400px;
        margin: 20px auto;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }
      .axis-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 80px;
      }
      .axis-label {
        font-size: 11px;
        color: #aaa;
        margin-bottom: 5px;
        font-weight: bold;
      }
      .axis-value {
        font-size: 18px;
        font-family: monospace;
        color: #2ed573;
      }
      #start-btn {
        padding: 15px 35px;
        font-size: 16px;
        font-weight: bold;
        background-color: #3498db;
        border: none;
        color: white;
        border-radius: 50px;
        cursor: pointer;
        margin: 20px auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      #start-btn.active {
        background-color: #2ed573;
      }
      .geo-section {
        margin-top: 10px;
        padding: 20px;
        background: #252525;
        width: 90%;
        max-width: 400px;
        border-radius: 15px;
        margin: 0 auto;
      }
      input[type="text"] {
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #444;
        background-color: #333;
        color: white;
        width: 85%;
        margin-bottom: 12px;
        font-size: 16px;
      }
      .geo-btn {
        padding: 12px;
        background-color: #f39c12;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        width: 92%;
      }
      .coords-display {
        margin-top: 15px;
        font-family: monospace;
        color: #3498db;
        font-size: 16px;
      }
      .hint {
        font-size: 11px;
        color: #666;
        margin-top: 8px;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <div id="desktop-blocker"><h1>MOBILE ONLY</h1></div>
    <div class="app-container" id="main-content">
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>
      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">ALPHA</span
          ><span class="axis-value" id="val-alpha">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">BETA</span
          ><span class="axis-value" id="val-beta">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">GAMMA</span
          ><span class="axis-value" id="val-gamma">0°</span>
        </div>
      </div>
      <button id="start-btn"><span id="btn-text">Start Sensors</span></button>
      <div class="geo-section">
        <input
          type="text"
          id="geo-input"
          placeholder="Zip, Country (e.g. 26364, Israel)"
        />
        <button class="geo-btn" onclick="getCoordinates()">
          Search Location
        </button>
        <div id="coords-result" class="coords-display">Lat: -- | Lon: --</div>
        <p class="hint">
          Use a comma for best results:<br /><b>26364, Israel</b> or
          <b>90210, USA</b>
        </p>
      </div>
    </div>

    <script>
      const headingDisplay = document.getElementById("heading-val");
      const alphaDisplay = document.getElementById("val-alpha");
      const betaDisplay = document.getElementById("val-beta");
      const gammaDisplay = document.getElementById("val-gamma");
      const startBtn = document.getElementById("start-btn");
      const coordsResult = document.getElementById("coords-result");

      async function getCoordinates() {
        const input = document.getElementById("geo-input").value;
        if (!input) return;
        coordsResult.innerText = "Searching...";

        let url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(input)}`;

        // אם המשתמש שם פסיק, אנחנו עוזרים ל-API להפריד בין מיקוד למדינה
        if (input.includes(",")) {
          const parts = input.split(",");
          const zip = parts[0].trim();
          const country = parts[1].trim();
          url = `https://nominatim.openstreetmap.org/search?postalcode=${encodeURIComponent(zip)}&country=${encodeURIComponent(country)}&format=json&limit=1`;
        }

        try {
          const response = await fetch(url);
          const data = await response.json();
          if (data && data.length > 0) {
            coordsResult.innerText = `Lat: ${parseFloat(data[0].lat).toFixed(4)} | Lon: ${parseFloat(data[0].lon).toFixed(4)}`;
          } else {
            coordsResult.innerText = "Not found. Try: Zip, Country";
          }
        } catch (e) {
          coordsResult.innerText = "Error fetching data.";
        }
      }

      function handleCompass(event) {
        let h = event.webkitCompassHeading || event.alpha || 0;
        headingDisplay.innerText = Math.round(h) % 360;
        alphaDisplay.innerText = (Math.round(h) % 360) + "°";
      }
      function handleTilt(e) {
        betaDisplay.innerText = Math.round(e.beta || 0) + "°";
        gammaDisplay.innerText = Math.round(e.gamma || 0) + "°";
      }

      startBtn.onclick = async () => {
        startBtn.classList.add("active");
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const p = await DeviceOrientationEvent.requestPermission();
          if (p === "granted")
            window.addEventListener("deviceorientation", (e) => {
              handleCompass(e);
              handleTilt(e);
            });
        } else {
          window.addEventListener(
            "deviceorientationabsolute",
            handleCompass,
            true,
          );
          window.addEventListener("deviceorientation", handleTilt, true);
        }
      };
    </script>
  </body>
</html>
