<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Global Compass & Geocoder</title>
    <style>
      /* Base page setup */
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #1a1a1a;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        height: 100vh;
        padding-top: 30px;
        overflow-y: auto;
        user-select: none;
      }

      #desktop-blocker {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 9999;
        text-align: center;
        padding-top: 100px;
      }

      .app-container {
        text-align: center;
        width: 100%;
      }

      .arrow-indicator {
        font-size: 40px;
        color: #ffffff;
        margin-bottom: 0;
        display: block;
      }

      .degree-display {
        font-size: 80px;
        font-weight: 900;
        margin: 0;
        line-height: 1;
      }

      .degree-symbol {
        font-size: 30px;
        vertical-align: top;
        color: #777;
      }

      .axes-row {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
        background: #252525;
        padding: 15px;
        width: 90%;
        max-width: 400px;
        margin-left: auto;
        margin-right: auto;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
      }

      .axis-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 80px;
      }

      .axis-label {
        font-size: 11px;
        color: #aaa;
        margin-bottom: 5px;
        font-weight: bold;
      }

      .axis-value {
        font-size: 18px;
        font-family: monospace;
        color: #2ed573;
      }

      #start-btn {
        padding: 15px 35px;
        font-size: 16px;
        font-weight: bold;
        background-color: #3498db;
        border: none;
        color: white;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-left: auto;
        margin-right: auto;
      }

      #start-btn.active {
        background-color: #2ed573;
        cursor: default;
      }

      .check-mark {
        display: none;
        font-size: 20px;
      }

      #start-btn.active .check-mark {
        display: inline;
      }

      .geo-section {
        margin-top: 30px;
        padding: 15px;
        background: #252525;
        width: 90%;
        max-width: 400px;
        border-radius: 15px;
        margin-left: auto;
        margin-right: auto;
      }

      input[type="text"] {
        padding: 10px;
        border-radius: 5px;
        border: 1px solid #444;
        background-color: #333;
        color: white;
        width: 80%;
        margin-bottom: 10px;
        font-size: 16px;
      }

      .geo-btn {
        padding: 10px 20px;
        background-color: #f39c12;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
        width: 85%;
      }

      .coords-display {
        margin-top: 10px;
        font-family: monospace;
        color: #3498db;
        font-size: 14px;
        min-height: 20px;
      }

      .geo-hint {
        font-size: 10px;
        color: #777;
        margin-top: 5px;
      }

      .future-content-spacer {
        margin-top: 40px;
        width: 80%;
        border-top: 1px dashed #444;
      }
    </style>
  </head>
  <body>
    <div id="desktop-blocker">
      <h1>MOBILE ONLY</h1>
      <p>Please open this site on your smartphone or tablet.</p>
    </div>

    <div class="app-container" id="main-content">
      <div class="arrow-indicator">↑</div>
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>

      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">ALPHA (α)</span>
          <span class="axis-value" id="val-alpha">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">BETA (β)</span>
          <span class="axis-value" id="val-beta">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">GAMMA (γ)</span>
          <span class="axis-value" id="val-gamma">0°</span>
        </div>
      </div>

      <button id="start-btn">
        <span class="check-mark">✓</span>
        <span id="btn-text">Start Sensors</span>
      </button>

      <div class="geo-section">
        <input
          type="text"
          id="geo-input"
          placeholder="Zip, City or Address..."
        />
        <button class="geo-btn" onclick="getCoordinates()">
          Search Location
        </button>
        <div id="coords-result" class="coords-display">Lat: -- | Lon: --</div>
        <div class="geo-hint">
          Tip: Add country name for better accuracy (e.g. 26364 Israel)
        </div>
      </div>

      <div class="future-content-spacer"></div>
    </div>

    <script>
      const headingDisplay = document.getElementById("heading-val");
      const alphaDisplay = document.getElementById("val-alpha");
      const betaDisplay = document.getElementById("val-beta");
      const gammaDisplay = document.getElementById("val-gamma");
      const startBtn = document.getElementById("start-btn");
      const btnText = document.getElementById("btn-text");
      const coordsResult = document.getElementById("coords-result");

      function handleCompass(event) {
        let heading = 0;
        if (event.webkitCompassHeading) {
          heading = event.webkitCompassHeading;
        } else {
          heading = event.alpha;
        }
        const finalHeading = Math.round(heading) % 360;
        headingDisplay.innerText = finalHeading;
        alphaDisplay.innerText = finalHeading + "°";
      }

      function handleTilt(event) {
        betaDisplay.innerText = Math.round(event.beta || 0) + "°";
        gammaDisplay.innerText = Math.round(event.gamma || 0) + "°";
      }

      // NEW GLOBAL SEARCH FUNCTION
      async function getCoordinates() {
        const query = document.getElementById("geo-input").value;
        if (!query) return alert("Please enter a location");

        coordsResult.innerText = "Searching globally...";

        try {
          // משתמשים בפרמטר q שמחפש הכל (כתובת, עיר או מיקוד) בכל העולם
          const response = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`,
          );
          const data = await response.json();

          if (data && data.length > 0) {
            const lat = parseFloat(data[0].lat).toFixed(4);
            const lon = parseFloat(data[0].lon).toFixed(4);
            coordsResult.innerText = `Lat: ${lat} | Lon: ${lon}`;
          } else {
            coordsResult.innerText =
              "Location not found. Try adding a country.";
          }
        } catch (error) {
          console.error(error);
          coordsResult.innerText = "Error fetching data.";
        }
      }

      async function initSensors() {
        startBtn.classList.add("active");
        btnText.innerText = "Sensors Active";
        startBtn.disabled = true;

        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          try {
            const permission = await DeviceOrientationEvent.requestPermission();
            if (permission === "granted") {
              window.addEventListener("deviceorientation", (e) => {
                handleCompass(e);
                handleTilt(e);
              });
            }
          } catch (err) {
            console.error(err);
          }
        } else {
          window.addEventListener(
            "deviceorientationabsolute",
            handleCompass,
            true,
          );
          window.addEventListener("deviceorientation", handleTilt, true);
        }
      }

      startBtn.addEventListener("click", initSensors);

      window.onload = () => {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
        if (!isMobile && window.innerWidth > 1024) {
          document.getElementById("desktop-blocker").style.display = "block";
          document.getElementById("main-content").style.display = "none";
        }
      };
    </script>
  </body>
</html>
