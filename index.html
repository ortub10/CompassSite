<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Global Compass & Satellite Finder</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="desktop-blocker">
      <h1>MOBILE ONLY</h1>
      <p>Please open this site on your smartphone or tablet.</p>
    </div>

    <div class="app-container" id="main-content">
      <div class="arrow-indicator">↑</div>
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>

      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">ALPHA</span>
          <span class="axis-value" id="val-alpha">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">BETA</span>
          <span class="axis-value" id="val-beta">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">GAMMA</span>
          <span class="axis-value" id="val-gamma">0°</span>
        </div>
      </div>

      <button id="start-btn">
        <span class="check-mark">✓</span>
        <span id="btn-text">Start Sensors</span>
      </button>

      <div class="geo-section">
        <input type="text" id="geo-input" placeholder="Zip City" />
        <button class="geo-btn" onclick="getCoordinates()">
          1. Set My Location
        </button>
        <div id="coords-result" class="coords-display">Lat: -- | Lon: --</div>
      </div>

      <div class="geo-section">
        <input
          type="number"
          id="sat-input"
          placeholder="Satellite Longitude (-180 to 180)"
        />
        <button class="geo-btn sat-btn" onclick="calculateSatellite()">
          2. Calculate Satellite Look Angle
        </button>
        <div id="sat-result" class="sat-result-display">
          AZIMUTH: -- | ELEV: --
        </div>
      </div>

      <div class="future-content-spacer"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
