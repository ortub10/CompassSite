<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Professional Compass Tracker</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Arial, sans-serif;
        background-color: #121212;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100vh;
        padding-top: 30px;
        user-select: none;
        touch-action: manipulation;
      }

      .degree-display {
        font-size: 85px;
        font-weight: 900;
        margin: 10px 0;
        line-height: 1;
        color: #ffffff;
      }

      .degree-symbol {
        font-size: 30px;
        color: #555;
      }

      /* Statistics Row */
      .axes-row {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 20px;
        background: #1e1e1e;
        padding: 20px;
        width: 90%;
        max-width: 400px;
        border-radius: 20px;
        border: 1px solid #333;
      }

      .axis-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 1;
      }

      .axis-label {
        font-size: 10px;
        color: #888;
        margin-bottom: 8px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .axis-value {
        font-size: 20px;
        font-family: "Courier New", monospace;
        color: #00d2ff;
        font-weight: bold;
      }

      #start-btn {
        padding: 18px 40px;
        font-size: 18px;
        font-weight: bold;
        background: linear-gradient(145deg, #3498db, #2980b9);
        border: none;
        color: white;
        border-radius: 50px;
        cursor: pointer;
        margin-top: 40px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        transition: all 0.2s ease;
      }

      #start-btn:active {
        transform: scale(0.95);
      }
      #start-btn.active {
        background: #ff4757;
      }

      #desktop-blocker {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #000;
        z-index: 100;
        text-align: center;
        padding-top: 100px;
      }
    </style>
  </head>
  <body>
    <div id="desktop-blocker"><h1>MOBILE ONLY</h1></div>

    <div class="app-container">
      <div style="font-size: 40px">↑</div>
      <div class="degree-display">
        <span id="heading-val">0</span><span class="degree-symbol">°</span>
      </div>

      <div class="axes-row">
        <div class="axis-item">
          <span class="axis-label">REL-A</span>
          <span id="rel-alpha" class="axis-value">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">REL-B</span>
          <span id="rel-beta" class="axis-value">0°</span>
        </div>
        <div class="axis-item">
          <span class="axis-label">REL-G</span>
          <span id="rel-gamma" class="axis-value">0°</span>
        </div>
      </div>

      <button id="start-btn">SET REFERENCE</button>
    </div>

    <script>
      const headingDisp = document.getElementById("heading-val");
      const aDisp = document.getElementById("rel-alpha");
      const bDisp = document.getElementById("rel-beta");
      const gDisp = document.getElementById("rel-gamma");
      const btn = document.getElementById("start-btn");

      let refA = null,
        refB = null,
        refG = null;
      let curA = 0,
        curB = 0,
        curG = 0;

      function updateDisplay(event) {
        // הגיון מצפן אחיד
        let alpha = event.alpha || 0;
        if (event.webkitCompassHeading) {
          alpha = event.webkitCompassHeading;
        }

        curA = alpha;
        curB = event.beta || 0;
        curG = event.gamma || 0;

        // המצפן הגדול תמיד אבסולוטי
        headingDisp.innerText = Math.round(curA);

        // חישוב יחסי רק אם נקבעה נקודת ייחוס
        if (refA !== null) {
          let diffA = Math.round(curA - refA);
          if (diffA > 180) diffA -= 360;
          if (diffA < -180) diffA += 360;

          let diffB = Math.round(curB - refB);
          let diffG = Math.round(curG - refG);

          aDisp.innerText = (diffA > 0 ? "+" : "") + diffA + "°";
          bDisp.innerText = (diffB > 0 ? "+" : "") + diffB + "°";
          gDisp.innerText = (diffG > 0 ? "+" : "") + diffG + "°";
        }
      }

      btn.onclick = async () => {
        // בקשת הרשאה (iOS) או הפעלה ישירה
        if (typeof DeviceOrientationEvent.requestPermission === "function") {
          const p = await DeviceOrientationEvent.requestPermission();
          if (p !== "granted") return;
        }

        // קביעת נקודת הייחוס לערכים הנוכחיים בדיוק ברגע הלחיצה
        refA = curA;
        refB = curB;
        refG = curG;

        btn.classList.add("active");
        btn.innerText = "RESET REFERENCE";

        // הוספת מאזינים אם עדיין לא קיימים
        window.removeEventListener("deviceorientation", updateDisplay);
        window.removeEventListener("deviceorientationabsolute", updateDisplay);

        if ("ondeviceorientationabsolute" in window) {
          window.addEventListener(
            "deviceorientationabsolute",
            updateDisplay,
            true,
          );
        } else {
          window.addEventListener("deviceorientation", updateDisplay, true);
        }
      };

      window.onload = () => {
        if (!/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
          document.getElementById("desktop-blocker").style.display = "block";
        }
      };
    </script>
  </body>
</html>
